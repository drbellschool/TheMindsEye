<a class="route-card {{ route_card_class }}" href="{{ href }}">
  <span class="route-card__label">{{ route_id }}</span>
  <h3 class="route-card__title">{{ title }}</h3>
  <p class="route-card__desc">{{ subtitle }}</p>
  <p class="route-card__desc">{{ summary }}</p>
  <p class="route-card__stat"><strong>{{ stat_label }}:</strong> {{ stat_value }}</p>
</a>
