services:
  postgres:
    image: postgres:16
    container_name: mindseye-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindseye}
      POSTGRES_USER: ${POSTGRES_USER:-mindseye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindseye_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mindseye-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindseye} -d ${POSTGRES_DB:-mindseye}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mindseye-postgres-data:
