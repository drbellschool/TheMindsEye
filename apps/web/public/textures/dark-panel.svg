<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" fill="none">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="960">
      <stop stop-color="#1f1714" />
      <stop offset="1" stop-color="#0f0d0c" />
    </linearGradient>
  </defs>
  <rect width="1280" height="960" fill="url(#panel)" />
  <rect width="1280" height="960" filter="url(#noise)" opacity=".65" />
  <rect x="18" y="18" width="1244" height="924" rx="28" stroke="#8f6a37" stroke-opacity=".18" stroke-width="2" />
</svg>
