<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" fill="none">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 480) rotate(90) scale(540 720)">
      <stop stop-color="#f7efd8" />
      <stop offset="1" stop-color="#e8d2a8" />
    </radialGradient>
  </defs>
  <rect width="1280" height="960" fill="url(#warm)" />
  <rect width="1280" height="960" filter="url(#noise)" opacity=".8" />
  <ellipse cx="220" cy="180" rx="180" ry="120" fill="#d0b07a" opacity=".08" />
  <ellipse cx="1030" cy="760" rx="240" ry="160" fill="#c1975a" opacity=".08" />
  <path d="M0 72C120 40 260 32 384 48" stroke="#8b6b3b" stroke-opacity=".08" stroke-width="2" />
  <path d="M0 936C160 900 280 892 416 912" stroke="#8b6b3b" stroke-opacity=".08" stroke-width="2" />
</svg>
