<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" fill="none">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07" />
      </feComponentTransfer>
    </filter>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" stroke="#7b5c35" stroke-opacity=".12" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1280" height="960" fill="#e9d4a7" />
  <rect width="1280" height="960" fill="url(#grid)" />
  <rect width="1280" height="960" filter="url(#noise)" opacity=".85" />
  <ellipse cx="260" cy="180" rx="210" ry="120" fill="#9f7440" opacity=".08" />
  <ellipse cx="980" cy="720" rx="240" ry="150" fill="#9f7440" opacity=".07" />
  <path d="M80 140C300 112 460 120 680 160" stroke="#5f462a" stroke-opacity=".12" stroke-width="3" />
  <path d="M180 740C400 708 560 708 760 744" stroke="#5f462a" stroke-opacity=".12" stroke-width="3" />
</svg>
